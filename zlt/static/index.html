<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light dark">
<title>zlt · signal</title>
<script>
  /* Set the theme before first paint: no flash of the wrong background.
     Explicit choice wins; otherwise follow the OS. */
  (function () {
    var t = "light";
    try {
      var saved = localStorage.getItem("zlt-theme");
      t = saved || (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
    } catch (e) {}
    document.documentElement.dataset.theme = t;
  })();
</script>
<style>
  :root{
    color-scheme:light;
    --bg:#F7F8FA; --surface:#FFFFFF; --line:#E7EAEE; --line-soft:#F0F2F4; --trace:#DDE1E6;
    --ink:#1A1D21; --muted:#6B7280; --faint:#9CA3AF;
    --good:#16A34A; --fair:#D97706; --poor:#DC2626;
    --q:var(--faint); /* live quality colour, set by JS */
    --nums:ui-monospace,'SF Mono',Menlo,Consolas,monospace;
  }
  :root[data-theme="dark"]{
    color-scheme:dark;
    --bg:#131519; --surface:#1A1D22; --line:#2A2F37; --line-soft:#22262D; --trace:#363C45;
    --ink:#E9ECF0; --muted:#98A1AE; --faint:#69717E;
    --good:#4ADE80; --fair:#FBBF24; --poor:#F87171;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:var(--bg); color:var(--ink);
    font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
    font-size:15px; line-height:1.5; -webkit-font-smoothing:antialiased;
    transition:background-color .2s, color .2s;
  }
  main{max-width:620px; margin:0 auto; padding:24px 22px 64px}
  :focus-visible{outline:2px solid var(--ink); outline-offset:3px; border-radius:2px}

  header{display:flex; align-items:center; gap:10px; margin-bottom:8px}
  .wordmark{font-weight:600; font-size:15px}
  .host{color:var(--faint); font-size:13px}
  .session{margin-left:auto; display:flex; align-items:center; gap:6px; font-size:13px; color:var(--muted)}
  .dot{width:7px; height:7px; border-radius:50%; background:var(--faint)}
  .dot.on{background:var(--good)} .dot.off{background:var(--poor)}
  .theme{
    display:grid; place-items:center; width:30px; height:30px; padding:0;
    background:none; border:1px solid var(--line); border-radius:50%;
    color:var(--faint); cursor:pointer;
  }
  .theme:hover{color:var(--ink)}
  .theme svg{display:block}
  .theme .sun{display:none}
  :root[data-theme="dark"] .theme .sun{display:block}
  :root[data-theme="dark"] .theme .moon{display:none}

  #banner{display:none; color:var(--poor); font-size:13px; margin:10px 0}
  #banner.show{display:block}
  #note{display:none; color:var(--faint); font-size:13px; margin:6px 0}
  #note.show{display:block}

  .hero{margin:38px 0 10px; text-align:center}
  .hero .label{font-size:12px; letter-spacing:.18em; text-transform:uppercase; color:var(--faint)}
  .hero .big{
    font-size:clamp(72px,19vw,112px); font-weight:200; letter-spacing:-.03em;
    line-height:1; margin:8px 0 4px; font-variant-numeric:tabular-nums;
  }
  .hero .big small{font-size:22px; font-weight:400; color:var(--faint); letter-spacing:0; margin-left:6px}
  .hero .quality{font-size:15px; font-weight:500; color:var(--q); transition:color .5s}

  .bar{height:3px; background:var(--line-soft); border-radius:2px; margin:30px 0 6px; overflow:hidden}
  .bar i{display:block; height:100%; width:0%; background:var(--q); border-radius:2px;
    transition:width .6s ease, background-color .5s}
  .bar-ends{display:flex; justify-content:space-between; color:var(--faint); font-size:11px;
    font-family:var(--nums); margin-bottom:38px}

  section{margin-bottom:40px}
  section h2{font-size:12px; letter-spacing:.18em; text-transform:uppercase; color:var(--faint);
    font-weight:500; margin-bottom:14px}
  .caption{float:right; letter-spacing:0; text-transform:none; font-size:12px; color:var(--faint)}

  .seg{display:flex; gap:8px; flex-wrap:wrap}
  .seg button{
    font:inherit; font-size:14px; padding:8px 16px; cursor:pointer;
    background:var(--surface); color:var(--muted);
    border:1px solid var(--line); border-radius:999px;
    transition:background-color .15s, color .15s, border-color .15s;
  }
  .seg button:hover:not(.active){color:var(--ink); border-color:var(--faint)}
  .seg button.active{background:var(--ink); border-color:var(--ink); color:var(--bg); font-weight:500}
  .seg button:disabled{opacity:.45; cursor:wait}
  .modehint{font-size:13px; color:var(--faint); margin-top:10px; min-height:18px}

  .spark-wrap{background:var(--surface); border:1px solid var(--line); border-radius:10px;
    padding:16px 14px 10px}
  svg#spark{display:block; width:100%; height:96px}

  .readings{background:var(--surface); border:1px solid var(--line); border-radius:10px; padding:4px 18px}
  .row{display:flex; justify-content:space-between; align-items:baseline;
    padding:11px 0; border-bottom:1px solid var(--line-soft)}
  .row:last-child{border-bottom:none}
  .row .k{color:var(--muted); font-size:14px}
  .row .v{font-family:var(--nums); font-size:14px}
  .row .v:empty::after{content:"—"; color:var(--faint)}

  #ussd-saved{margin-bottom:12px}
  #ussd-saved:empty{display:none}
  .ussd-row{display:flex; gap:8px; margin-bottom:10px}
  .ussd-input{
    flex:1; min-width:0; font:inherit; font-size:14px; padding:8px 14px;
    background:var(--surface); color:var(--ink);
    border:1px solid var(--line); border-radius:8px;
  }
  .ussd-input::placeholder{color:var(--faint)}
  .ussd-btn{
    font:inherit; font-size:14px; padding:8px 16px; cursor:pointer;
    background:var(--ink); color:var(--bg); border:1px solid var(--ink);
    border-radius:8px; font-weight:500; transition:opacity .15s;
  }
  .ussd-btn:hover{opacity:.85}
  .ussd-btn:disabled{opacity:.45; cursor:wait}
  .ussd-btn-ghost{background:none; color:var(--muted); border:1px solid var(--line)}
  .ussd-btn-ghost:hover{color:var(--poor); border-color:var(--poor); opacity:1}
  .ussd-out{
    background:var(--surface); border:1px solid var(--line); border-radius:10px;
    padding:14px 16px; margin-bottom:10px; font-family:var(--nums); font-size:13px;
    white-space:pre-wrap; word-break:break-word; color:var(--ink);
  }
  .ussd-out.error{color:var(--poor); border-color:var(--poor)}

  footer{display:flex; align-items:center; gap:18px; color:var(--faint); font-size:13px}
  footer button, footer select{
    font:inherit; font-size:13px; background:none; border:none; color:var(--muted);
    cursor:pointer; padding:2px 0; text-decoration:underline; text-underline-offset:3px;
  }
  footer select{text-decoration:none; border-bottom:1px solid var(--line)}
  @media (prefers-reduced-motion: reduce){ *{transition:none !important} }
</style>
</head>
<body>
<main>
  <header>
    <span class="wordmark">zlt</span>
    <span class="host" id="host"></span>
    <span class="session"><span class="dot" id="dot"></span><span id="sessionWord">connecting</span></span>
    <button class="theme" id="theme" aria-label="Switch to dark theme">
      <svg class="moon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
      <svg class="sun" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="1.8" stroke-linecap="round" aria-hidden="true">
        <circle cx="12" cy="12" r="4.5"/>
        <path d="M12 1.5v2M12 20.5v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M1.5 12h2M20.5 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/>
      </svg>
    </button>
  </header>
  <div id="banner" role="alert"></div>
  <div id="note"></div>

  <div class="hero">
    <div class="label" id="bigLabel">RSRP</div>
    <div class="big"><span id="bigVal">—</span><small>dBm</small></div>
    <div class="quality" id="qualityWord">&nbsp;</div>
  </div>

  <div class="bar" aria-hidden="true"><i id="fill"></i></div>
  <div class="bar-ends"><span id="barMin"></span><span id="barMax"></span></div>

  <section>
    <h2>Network mode</h2>
    <div class="seg" id="seg" role="group" aria-label="Network mode">
      <button data-mode="auto">Auto</button>
      <button data-mode="lte">4G</button>
      <button data-mode="4g3g">4G/3G</button>
      <button data-mode="wcdma">3G</button>
      <button data-mode="gsm">2G</button>
    </div>
    <div class="modehint" id="modehint"></div>
  </section>

  <section>
    <h2>Walk test <span class="caption" id="sparkCaption">last 15 min</span></h2>
    <div class="spark-wrap">
      <svg id="spark" viewBox="0 0 800 96" preserveAspectRatio="none" aria-label="Signal history"></svg>
    </div>
  </section>

  <section>
    <h2>Readings</h2>
    <div class="readings" id="readings"></div>
  </section>

  <section id="ussd-panel">
    <h2>USSD</h2>
    <div class="seg" id="ussd-saved"></div>
    <form id="ussd-form" class="ussd-row">
      <input id="ussd-code" class="ussd-input" placeholder="*310#" autocomplete="off">
      <button type="submit" class="ussd-btn">Send</button>
    </form>
    <pre id="ussd-out" class="ussd-out" hidden></pre>
    <form id="ussd-reply-form" class="ussd-row" hidden>
      <input id="ussd-reply" class="ussd-input" placeholder="reply" autocomplete="off">
      <button type="submit" class="ussd-btn">Reply</button>
      <button type="button" id="ussd-cancel" class="ussd-btn ussd-btn-ghost">Cancel</button>
    </form>
    <div id="ussd-spinner" class="modehint" hidden>sending&hellip;</div>
  </section>

  <footer>
    <button id="pause">Pause</button>
    <label>every
      <select id="interval">
        <option value="1000">1s</option>
        <option value="3000" selected>3s</option>
        <option value="10000">10s</option>
      </select>
    </label>
    <span id="stamp"></span>
  </footer>
</main>

<script>
"use strict";
const $ = id => document.getElementById(id);

/* --- theme ---------------------------------------------------------------- */
const root = document.documentElement;
function applyTheme(t){
  root.dataset.theme = t;
  $('theme').setAttribute('aria-label',
    t === 'dark' ? 'Switch to light theme' : 'Switch to dark theme');
}
applyTheme(root.dataset.theme);
$('theme').addEventListener('click', () => {
  const next = root.dataset.theme === 'dark' ? 'light' : 'dark';
  applyTheme(next);
  try { localStorage.setItem('zlt-theme', next); } catch (e) {}
});
/* Keep following the OS until an explicit choice has been made. */
matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
  let saved = null;
  try { saved = localStorage.getItem('zlt-theme'); } catch (err) {}
  if (!saved) applyTheme(e.matches ? 'dark' : 'light');
});

/* --- signal quality ------------------------------------------------------- */
const METRIC = {
  rsrp: { min:-125, max:-70, fair:-100, good:-90, excellent:-80 },
  rssi: { min:-100, max:-45, fair:-75,  good:-65, excellent:-55 },
};
function quality(kind, v){
  const m = METRIC[kind];
  if (v >= m.excellent) return ['excellent', 'var(--good)'];
  if (v >= m.good)      return ['good',      'var(--good)'];
  if (v >= m.fair)      return ['fair',      'var(--fair)'];
  return ['poor', 'var(--poor)'];
}

/* --- walk-test history ---------------------------------------------------- */
const HIST_MS = 15*60*1000;
const hist = [];
function pushHist(rsrp, rssi){
  const now = Date.now();
  hist.push({t:now, rsrp, rssi});
  while (hist.length && now - hist[0].t > HIST_MS) hist.shift();
}
function drawSpark(){
  const svg = $('spark');
  if (hist.length < 2){ svg.innerHTML = ''; return; }
  const t0 = hist[0].t, span = Math.max(hist[hist.length-1].t - t0, 1);
  const y = v => 92 - (Math.min(Math.max(v,-120),-45) + 120) / 75 * 88;
  /* var() must go through style=, not a presentation attribute. */
  const line = (key, cssVar, w) => {
    const pts = hist.filter(h => h[key] != null)
      .map(h => `${((h.t-t0)/span*800).toFixed(1)},${y(h[key]).toFixed(1)}`);
    return pts.length > 1
      ? `<polyline points="${pts.join(' ')}" fill="none" style="stroke:${cssVar}"
          stroke-width="${w}" stroke-linejoin="round" vector-effect="non-scaling-stroke"/>` : '';
  };
  svg.innerHTML = line('rssi','var(--trace)',1.2) + line('rsrp','var(--q)',1.8);
  $('sparkCaption').textContent = hist.some(h => h.rsrp != null)
    ? 'rsrp · rssi in grey · last 15 min' : 'rssi · last 15 min';
}

/* --- readings list -------------------------------------------------------- */
const ROWS = [
  ['network_type','Network'], ['lte_band','Band'], ['signalbar','Bars (of 5)'],
  ['lte_snr','SNR (dB)'], ['lte_rsrq','RSRQ (dB)'], ['rssi','RSSI (dBm)'],
  ['lte_pci','Cell PCI'], ['ppp_status','Connection'],
];
function drawReadings(d){
  $('readings').innerHTML = ROWS.map(([k,label]) =>
    `<div class="row"><span class="k">${label}</span><span class="v">${d[k] ?? ''}</span></div>`
  ).join('');
}

/* --- status polling ------------------------------------------------------- */
let timer = null, paused = false;
async function poll(){
  try {
    const r = await fetch('/api/status');
    if (!r.ok) throw new Error((await r.json().catch(()=>({}))).detail || `HTTP ${r.status}`);
    const s = await r.json();
    $('banner').classList.remove('show');
    $('host').textContent = s.host.replace(/^https?:\/\//,'');
    $('dot').className = 'dot ' + (s.authed ? 'on' : 'off');
    $('sessionWord').textContent = s.authed ? 'logged in' : 'open data';
    if (s.note){ $('note').textContent = s.note; $('note').classList.add('show'); }
    else $('note').classList.remove('show');

    const d = s.data;
    const num = x => (x !== '' && x != null && !isNaN(Number(x))) ? Number(x) : null;
    const rsrp = num(d.lte_rsrp), rssi = num(d.rssi);
    const kind = rsrp != null ? 'rsrp' : 'rssi';
    const val  = rsrp != null ? rsrp : rssi;
    const m = METRIC[kind];
    $('bigLabel').textContent = kind.toUpperCase();
    $('barMin').textContent = m.min; $('barMax').textContent = m.max;
    if (val != null){
      const [word, color] = quality(kind, val);
      root.style.setProperty('--q', color);
      $('bigVal').textContent = val;
      $('qualityWord').textContent = word;
      $('fill').style.width =
        ((Math.min(Math.max(val,m.min),m.max) - m.min) / (m.max - m.min) * 100) + '%';
    } else {
      root.style.setProperty('--q', 'var(--faint)');
      $('bigVal').textContent = '—';
      $('qualityWord').textContent = 'no reading';
      $('fill').style.width = '0%';
    }
    pushHist(rsrp, rssi);
    drawSpark();
    drawReadings(d);
    $('stamp').textContent = 'updated ' + new Date().toLocaleTimeString();
  } catch (e) {
    $('banner').textContent = 'status: ' + e.message;
    $('banner').classList.add('show');
  }
}
function schedule(){
  clearInterval(timer);
  if (!paused) timer = setInterval(poll, Number($('interval').value));
}
$('interval').addEventListener('change', schedule);
$('pause').addEventListener('click', () => {
  paused = !paused;
  $('pause').textContent = paused ? 'Resume' : 'Pause';
  schedule();
  if (!paused) poll();
});

/* --- network mode --------------------------------------------------------- */
let modeBusy = false;
const segButtons = () => document.querySelectorAll('#seg button');
function markMode(friendly){
  segButtons().forEach(b => b.classList.toggle('active', b.dataset.mode === friendly));
}
async function loadMode(){
  try {
    const r = await fetch('/api/net');
    if (!r.ok) throw new Error((await r.json().catch(()=>({}))).detail || `HTTP ${r.status}`);
    const j = await r.json();
    markMode(j.friendly);
    $('modehint').textContent = j.configured ? `router reports ${j.configured}` : '';
  } catch (e) {
    $('modehint').textContent = 'mode: ' + e.message;
  }
}
segButtons().forEach(btn => {
  btn.addEventListener('click', async () => {
    if (modeBusy) return;
    modeBusy = true;
    segButtons().forEach(b => b.disabled = true);
    $('modehint').textContent = 'setting ' + btn.textContent + '…';
    try {
      const r = await fetch('/api/net', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({mode: btn.dataset.mode}),
      });
      const j = await r.json().catch(()=>({}));
      if (!r.ok) throw new Error(j.detail || `HTTP ${r.status}`);
      markMode(j.friendly);
      $('modehint').textContent = `set — router reports ${j.configured || 'unknown'}`;
    } catch (e) {
      $('modehint').textContent = 'set failed: ' + e.message;
      loadMode();
    } finally {
      modeBusy = false;
      segButtons().forEach(b => b.disabled = false);
    }
  });
});

poll(); loadMode(); schedule();
</script>

<script>
(function () {
  "use strict";
  const panel = document.getElementById('ussd-panel');
  const out = document.getElementById('ussd-out');
  const sendForm = document.getElementById('ussd-form');
  const codeInput = document.getElementById('ussd-code');
  const replyForm = document.getElementById('ussd-reply-form');
  const replyInput = document.getElementById('ussd-reply');
  const spinner = document.getElementById('ussd-spinner');
  const savedBox = document.getElementById('ussd-saved');

  let busy = false;
  function setBusy(state) {
    panel.querySelectorAll('button').forEach(b => b.disabled = state);
  }

  /* show() is contracted for the {text, state} shape that send/reply return.
     The cancel endpoint returns {ok: true} instead, so cancel must never be
     routed through here - see the dedicated onCancelled() handler below. */
  function show(result) {
    out.hidden = false;
    out.classList.toggle('error', result.state === 'error' || result.state === 'timeout');
    out.textContent = result.state === 'timeout'
      ? '(no response from network)'
      : (result.state === 'error' ? 'USSD error: ' + result.text : result.text);
    replyForm.hidden = result.state !== 'prompt';
  }

  function onCancelled() {
    out.hidden = false;
    out.classList.remove('error');
    out.textContent = 'cancelled';
    replyForm.hidden = true;
  }

  /* onResult, when given, replaces the default show() handling of a
     successful response - used by cancel, whose {ok} payload does not match
     show()'s {text, state} contract. Failures still go through show(), since
     {state: 'error', text} always matches that contract. */
  async function call(url, payload, onResult) {
    if (busy) return;
    busy = true;
    setBusy(true);
    spinner.hidden = false;
    try {
      const r = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: payload ? JSON.stringify(payload) : undefined,
      });
      if (!r.ok) { show({ state: 'error', text: 'request failed (' + r.status + ')' }); return; }
      const data = await r.json();
      (onResult || show)(data);
    } catch (e) {
      show({ state: 'error', text: String(e) });
    } finally {
      spinner.hidden = true;
      setBusy(false);
      busy = false;
    }
  }

  async function loadSaved() {
    savedBox.innerHTML = '';
    try {
      const r = await fetch('/api/ussd/codes');
      const data = await r.json();
      for (const c of data.codes) {
        const b = document.createElement('button');
        b.type = 'button';
        b.textContent = c.label;
        b.title = c.code;
        b.onclick = () => call('/api/ussd/send', { code: c.code });
        savedBox.appendChild(b);
      }
    } catch (e) { /* leave saved row empty */ }
  }

  sendForm.addEventListener('submit', (e) => {
    e.preventDefault();
    const code = codeInput.value.trim();
    if (code) call('/api/ussd/send', { code });
  });
  replyForm.addEventListener('submit', (e) => {
    e.preventDefault();
    call('/api/ussd/reply', { text: replyInput.value });
    replyInput.value = '';
  });
  document.getElementById('ussd-cancel').addEventListener('click', () => {
    replyForm.hidden = true;
    call('/api/ussd/cancel', null, onCancelled).then(loadSaved);
  });

  loadSaved();
})();
</script>
</body>
</html>
