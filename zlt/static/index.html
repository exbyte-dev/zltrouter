<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light">
<title>zlt · signal</title>
<style>
  :root{
    --bg:#F7F8FA; --surface:#FFFFFF; --line:#E7EAEE; --line-soft:#F0F2F4;
    --ink:#1A1D21; --muted:#6B7280; --faint:#9CA3AF;
    --q:#9CA3AF; /* live quality color — set by JS (green/amber/red) */
    --good:#16A34A; --fair:#D97706; --poor:#DC2626;
    --nums:ui-monospace,'SF Mono',Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:var(--bg); color:var(--ink);
    font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
    font-size:15px; line-height:1.5; -webkit-font-smoothing:antialiased;
  }
  main{max-width:620px; margin:0 auto; padding:28px 22px 64px}
  :focus-visible{outline:2px solid var(--ink); outline-offset:3px; border-radius:2px}

  header{display:flex; align-items:center; gap:10px; margin-bottom:8px}
  .wordmark{font-weight:600; font-size:15px}
  .host{color:var(--faint); font-size:13px}
  .session{margin-left:auto; display:flex; align-items:center; gap:6px; font-size:13px; color:var(--muted)}
  .dot{width:7px; height:7px; border-radius:50%; background:var(--faint)}
  .dot.on{background:var(--good)} .dot.off{background:var(--poor)}

  #banner{display:none; color:var(--poor); font-size:13px; margin:10px 0}
  #banner.show{display:block}
  #note{display:none; color:var(--faint); font-size:13px; margin:6px 0}
  #note.show{display:block}

  .hero{margin:52px 0 10px; text-align:center}
  .hero .label{font-size:12px; letter-spacing:.18em; text-transform:uppercase; color:var(--faint)}
  .hero .big{
    font-size:clamp(76px,20vw,118px); font-weight:200; letter-spacing:-.03em;
    line-height:1; margin:10px 0 4px; font-variant-numeric:tabular-nums; color:var(--ink);
  }
  .hero .big small{font-size:22px; font-weight:400; color:var(--faint); letter-spacing:0; margin-left:6px}
  .hero .quality{font-size:15px; font-weight:500; color:var(--q); transition:color .5s}

  .bar{height:3px; background:var(--line-soft); border-radius:2px; margin:34px 0 6px; overflow:hidden}
  .bar i{display:block; height:100%; width:0%; background:var(--q); border-radius:2px;
    transition:width .6s ease, background-color .5s}
  .bar-ends{display:flex; justify-content:space-between; color:var(--faint); font-size:11px;
    font-family:var(--nums); margin-bottom:44px}

  section h2{font-size:12px; letter-spacing:.18em; text-transform:uppercase; color:var(--faint);
    font-weight:500; margin-bottom:14px}
  .caption{float:right; letter-spacing:0; text-transform:none; font-size:12px; color:var(--faint)}

  .spark-wrap{background:var(--surface); border:1px solid var(--line); border-radius:10px; padding:16px 14px 10px; margin-bottom:44px}
  svg{display:block; width:100%; height:96px}

  .readings{background:var(--surface); border:1px solid var(--line); border-radius:10px;
    padding:4px 18px; margin-bottom:44px}
  .row{display:flex; justify-content:space-between; align-items:baseline;
    padding:11px 0; border-bottom:1px solid var(--line-soft)}
  .row:last-child{border-bottom:none}
  .row .k{color:var(--muted); font-size:14px}
  .row .v{font-family:var(--nums); font-size:14px; color:var(--ink)}
  .row .v:empty::after{content:"—"; color:var(--faint)}

  .modes{margin-bottom:44px}
  .seg{display:flex; gap:8px; flex-wrap:wrap}
  .seg button{
    font:inherit; font-size:14px; padding:8px 16px; cursor:pointer;
    background:var(--surface); color:var(--muted);
    border:1px solid var(--line); border-radius:999px;
  }
  .seg button:hover{color:var(--ink)}
  .seg button.active{background:var(--ink); border-color:var(--ink); color:#fff}
  .seg button:disabled{opacity:.45; cursor:wait}
  .modehint{font-size:13px; color:var(--faint); margin-top:10px; min-height:18px}

  footer{display:flex; align-items:center; gap:18px; color:var(--faint); font-size:13px}
  footer button, footer select{
    font:inherit; font-size:13px; background:none; border:none; color:var(--muted);
    cursor:pointer; padding:2px 0; text-decoration:underline; text-underline-offset:3px;
  }
  footer select{text-decoration:none; border-bottom:1px solid var(--line)}
  @media (prefers-reduced-motion: reduce){ .bar i, .hero .quality{transition:none} }
</style>
</head>
<body>
<main>
  <header>
    <span class="wordmark">zlt</span>
    <span class="host" id="host"></span>
    <span class="session"><span class="dot" id="dot"></span><span id="sessionWord">connecting</span></span>
  </header>
  <div id="banner" role="alert"></div>
  <div id="note"></div>

  <div class="hero">
    <div class="label" id="bigLabel">RSRP</div>
    <div class="big"><span id="bigVal">—</span><small>dBm</small></div>
    <div class="quality" id="qualityWord">&nbsp;</div>
  </div>

  <div class="bar" aria-hidden="true"><i id="fill"></i></div>
  <div class="bar-ends"><span id="barMin"></span><span id="barMax"></span></div>

  <section>
    <h2>Walk test <span class="caption" id="sparkCaption">last 15 min</span></h2>
    <div class="spark-wrap">
      <svg id="spark" viewBox="0 0 800 96" preserveAspectRatio="none" aria-label="Signal history"></svg>
    </div>
  </section>

  <section>
    <h2>Readings</h2>
    <div class="readings" id="readings"></div>
  </section>

  <section class="modes">
    <h2>Network mode</h2>
    <div class="seg" id="seg" role="group" aria-label="Network mode">
      <button data-mode="auto">Auto</button>
      <button data-mode="lte">4G</button>
      <button data-mode="4g3g">4G/3G</button>
      <button data-mode="wcdma">3G</button>
      <button data-mode="gsm">2G</button>
    </div>
    <div class="modehint" id="modehint"></div>
  </section>

  <footer>
    <button id="pause">Pause</button>
    <label>every
      <select id="interval">
        <option value="1000">1s</option>
        <option value="3000" selected>3s</option>
        <option value="10000">10s</option>
      </select>
    </label>
    <span id="stamp"></span>
  </footer>
</main>

<script>
"use strict";
const $ = id => document.getElementById(id);

const METRIC = {
  rsrp: { min:-125, max:-70, fair:-100, good:-90, excellent:-80 },
  rssi: { min:-100, max:-45, fair:-75,  good:-65, excellent:-55 },
};
function quality(kind, v){
  const m = METRIC[kind];
  if (v >= m.excellent) return ['excellent', 'var(--good)'];
  if (v >= m.good)      return ['good',      'var(--good)'];
  if (v >= m.fair)      return ['fair',      'var(--fair)'];
  return ['poor', 'var(--poor)'];
}

/* Rolling history for the walk-test strip */
const HIST_MS = 15*60*1000;
const hist = [];
function pushHist(rsrp, rssi){
  const now = Date.now();
  hist.push({t:now, rsrp, rssi});
  while (hist.length && now - hist[0].t > HIST_MS) hist.shift();
}
function drawSpark(){
  const svg = $('spark');
  if (hist.length < 2){ svg.innerHTML = ''; return; }
  const t0 = hist[0].t, span = Math.max(hist[hist.length-1].t - t0, 1);
  const y = v => 92 - (Math.min(Math.max(v,-120),-45) + 120) / 75 * 88;
  const line = (key, stroke, w) => {
    const pts = hist.filter(h => h[key] != null)
      .map(h => `${((h.t-t0)/span*800).toFixed(1)},${y(h[key]).toFixed(1)}`);
    return pts.length > 1
      ? `<polyline points="${pts.join(' ')}" fill="none" stroke="${stroke}" stroke-width="${w}"
          stroke-linejoin="round" vector-effect="non-scaling-stroke"/>` : '';
  };
  svg.innerHTML = line('rssi','var(--line)',1.2) + line('rsrp','var(--q)',1.8);
  const hasRsrp = hist.some(h => h.rsrp != null);
  $('sparkCaption').textContent = hasRsrp ? 'rsrp · rssi in grey · last 15 min' : 'rssi · last 15 min';
}

/* Readings list */
const ROWS = [
  ['network_type','Network'], ['lte_band','Band'], ['signalbar','Bars (of 5)'],
  ['lte_snr','SNR (dB)'], ['lte_rsrq','RSRQ (dB)'], ['rssi','RSSI (dBm)'],
  ['lte_pci','Cell PCI'], ['ppp_status','Connection'],
];
function drawReadings(d){
  $('readings').innerHTML = ROWS.map(([k,label]) =>
    `<div class="row"><span class="k">${label}</span><span class="v">${d[k] ?? ''}</span></div>`
  ).join('');
}

/* Status polling */
let timer = null, paused = false;
async function poll(){
  try {
    const r = await fetch('/api/status');
    if (!r.ok) throw new Error((await r.json().catch(()=>({}))).detail || `HTTP ${r.status}`);
    const s = await r.json();
    $('banner').classList.remove('show');
    $('host').textContent = s.host.replace(/^https?:\/\//,'');
    $('dot').className = 'dot ' + (s.authed ? 'on' : 'off');
    $('sessionWord').textContent = s.authed ? 'logged in' : 'open data';
    if (s.note){ $('note').textContent = s.note; $('note').classList.add('show'); }
    else $('note').classList.remove('show');

    const d = s.data;
    const num = x => (x !== '' && x != null && !isNaN(Number(x))) ? Number(x) : null;
    const rsrp = num(d.lte_rsrp), rssi = num(d.rssi);
    const kind = rsrp != null ? 'rsrp' : 'rssi';
    const val  = rsrp != null ? rsrp : rssi;
    const m = METRIC[kind];
    $('bigLabel').textContent = kind.toUpperCase();
    $('barMin').textContent = m.min; $('barMax').textContent = m.max;
    if (val != null){
      const [word, color] = quality(kind, val);
      document.documentElement.style.setProperty('--q', color);
      $('bigVal').textContent = val;
      $('qualityWord').textContent = word;
      $('fill').style.width =
        ((Math.min(Math.max(val,m.min),m.max) - m.min) / (m.max - m.min) * 100) + '%';
    } else {
      document.documentElement.style.setProperty('--q', 'var(--faint)');
      $('bigVal').textContent = '—';
      $('qualityWord').textContent = 'no reading';
      $('fill').style.width = '0%';
    }
    pushHist(rsrp, rssi);
    drawSpark();
    drawReadings(d);
    $('stamp').textContent = 'updated ' + new Date().toLocaleTimeString();
  } catch (e) {
    $('banner').textContent = 'status: ' + e.message;
    $('banner').classList.add('show');
  }
}
function schedule(){
  clearInterval(timer);
  if (!paused) timer = setInterval(poll, Number($('interval').value));
}
$('interval').addEventListener('change', schedule);
$('pause').addEventListener('click', () => {
  paused = !paused;
  $('pause').textContent = paused ? 'Resume' : 'Pause';
  schedule();
  if (!paused) poll();
});

/* Network mode */
let modeBusy = false;
function markMode(friendly){
  document.querySelectorAll('#seg button').forEach(b =>
    b.classList.toggle('active', b.dataset.mode === friendly));
}
async function loadMode(){
  try {
    const r = await fetch('/api/net');
    if (!r.ok) throw new Error((await r.json().catch(()=>({}))).detail || `HTTP ${r.status}`);
    const j = await r.json();
    markMode(j.friendly);
    $('modehint').textContent = j.configured ? `router reports ${j.configured}` : '';
  } catch (e) {
    $('modehint').textContent = 'mode: ' + e.message;
  }
}
document.querySelectorAll('#seg button').forEach(btn => {
  btn.addEventListener('click', async () => {
    if (modeBusy) return;
    modeBusy = true;
    document.querySelectorAll('#seg button').forEach(b => b.disabled = true);
    $('modehint').textContent = 'setting ' + btn.textContent + '…';
    try {
      const r = await fetch('/api/net', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({mode: btn.dataset.mode}),
      });
      const j = await r.json().catch(()=>({}));
      if (!r.ok) throw new Error(j.detail || `HTTP ${r.status}`);
      markMode(j.friendly);
      $('modehint').textContent = `set — router reports ${j.configured || 'unknown'}`;
    } catch (e) {
      $('modehint').textContent = 'set failed: ' + e.message;
      loadMode();
    } finally {
      modeBusy = false;
      document.querySelectorAll('#seg button').forEach(b => b.disabled = false);
    }
  });
});

poll(); loadMode(); schedule();
</script>
</body>
</html>
